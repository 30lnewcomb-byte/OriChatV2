<!DOCTYPE html>
<html>
<head>
    <title>OriChat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="chat"></div>

<div id="typing"></div>

<div id="inputBar">
    <input id="msg" placeholder="Message..." oninput="typing()">
    <button onclick="sendMsg()">➤</button>
</div>

<!-- SLIDE ADMIN -->
<div id="adminToggle" onclick="toggleAdmin()">⚙️</div>

<div id="adminPanel">
    <h3>Admin</h3>
    <button onclick="ori(true)">Ori ON</button>
    <button onclick="ori(false)">Ori OFF</button>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="/static/script.js"></script>

</body>
</html>
