<!DOCTYPE html>
<html>
<head>
<title>OriChat</title>
<style>
body { font-family: Arial; background:#111; color:white; }
#topbar {
    display:flex;
    gap:10px;
    padding:10px;
    background:#222;
}
button {
    padding:8px 12px;
    background:#333;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover { background:#555; }
</style>
</head>
<body>

<div id="topbar">
    <button onclick="location.href='/chat'">💬 Chat</button>

    <!-- ONLY CARTER SEES THIS -->
    {% if user == "carter" %}
    <button onclick="location.href='/carter-game'">🎮 Carter Game</button>
    {% endif %}
</div>

<h2>Welcome {{user}}</h2>

<div id="chat"></div>

</body>
</html>
