<!DOCTYPE html>
<html>
<head>
<title>Carter Survival Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:monospace;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
    <div id="objective">Objective: Find the house</div>
    <div id="time"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER
let player = { x:400, y:300, speed:3 };

// INPUT
let keys = {};
document.onkeydown = e => keys[e.key.toLowerCase()] = true;
document.onkeyup = e => keys[e.key.toLowerCase()] = false;

// MOUSE (FLASHLIGHT)
let mouse = {x:0,y:0};
document.onmousemove = e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
};

// FLASHLIGHT
let flashlightOn = true;
document.oncontextmenu = e => {
    e.preventDefault();
    flashlightOn = !flashlightOn;
};

// TIME
let time = 0;
let isNight = false;

// MONSTER
let monster = { x:100, y:100, active:false };

// OBJECTIVE
let objective = "Find the house";

function update(){
    let speed = keys["shift"] ? 5 : 3;

    if(keys["w"]) player.y -= speed;
    if(keys["s"]) player.y += speed;
    if(keys["a"]) player.x -= speed;
    if(keys["d"]) player.x += speed;

    // DAY/NIGHT
    time += 0.02;
    if(time > 100) time = 0;
    isNight = time > 50;

    // MONSTER AI
    if(isNight){
        monster.active = true;

        let dx = player.x - monster.x;
        let dy = player.y - monster.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        monster.x += (dx/dist) * 1.5;
        monster.y += (dy/dist) * 1.5;
    }
}

function drawFlashlight(){
    if(!flashlightOn) return;

    let g = ctx.createRadialGradient(
        mouse.x, mouse.y, 20,
        mouse.x, mouse.y, 200
    );

    g.addColorStop(0, "rgba(255,255,255,0.9)");
    g.addColorStop(1, "rgba(0,0,0,0)");

    ctx.fillStyle = g;
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function draw(){
    ctx.fillStyle = isNight ? "black" : "#2c5";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // PLAYER
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, 20, 20);

    // MONSTER
    if(monster.active){
        ctx.fillStyle = "red";
        ctx.fillRect(monster.x, monster.y, 20, 20);
    }

    // FLASHLIGHT EFFECT
    if(isNight){
        ctx.globalCompositeOperation = "destination-out";
        drawFlashlight();
        ctx.globalCompositeOperation = "source-over";
    }

    document.getElementById("time").innerText =
        isNight ? "🌙 Night" : "☀️ Day";

    document.getElementById("objective").innerText =
        "Objective: " + objective;
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
